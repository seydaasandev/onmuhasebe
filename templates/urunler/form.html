{% extends 'base.html' %}
{% block title %}{{ baslik }} - onMuhasebe{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2><i class="fas fa-box{% if not urun %}-open{% endif %} me-2"></i>{{ baslik }}</h2>
  <a href="{{ url_for('urunler') }}" class="btn btn-outline-secondary">
    <i class="fas fa-arrow-left me-1"></i>Geri
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Ürün Adı <span class="text-danger">*</span></label>
          <input type="text" name="ad" class="form-control" value="{{ urun.ad if urun else '' }}" required placeholder="Ürün adını girin">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Barkod</label>
          <input type="text" name="barkod" class="form-control" value="{{ urun.barkod if urun and urun.barkod else '' }}" placeholder="Opsiyonel barkod numarası">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Birim</label>
          <select name="birim" class="form-select">
            {% for b in ['adet', 'kg', 'lt', 'm', 'paket', 'kutu'] %}
            <option value="{{ b }}" {% if urun and urun.birim == b %}selected{% elif not urun and b == 'adet' %}selected{% endif %}>{{ b }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Alış Fiyatı</label>
          <div class="input-group">
            <span class="input-group-text">₺</span>
            <input type="number" name="alis_fiyati" class="form-control" value="{{ urun.alis_fiyati if urun else '0' }}" step="0.01" min="0">
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Satış Fiyatı</label>
          <div class="input-group">
            <span class="input-group-text">₺</span>
            <input type="number" name="satis_fiyati" class="form-control" value="{{ urun.satis_fiyati if urun else '0' }}" step="0.01" min="0">
          </div>
        </div>
        {% if not urun %}
        <div class="col-md-6">
          <label class="form-label fw-semibold">Başlangıç Stok Miktarı</label>
          <input type="number" name="stok_miktari" class="form-control" value="0" step="0.01" min="0">
        </div>
        {% endif %}
        <div class="col-md-6">
          <label class="form-label fw-semibold">Kritik Stok Seviyesi</label>
          <input type="number" name="kritik_stok" class="form-control" value="{{ urun.kritik_stok if urun else '0' }}" step="0.01" min="0">
          <small class="text-muted">Bu seviyenin altına inince uyarı verilir.</small>
        </div>
        {% if urun %}
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mevcut Stok (Salt Okunur)</label>
          <div class="input-group">
            <input type="text" class="form-control" value="{{ urun.stok_miktari }} {{ urun.birim }}" readonly disabled>
          </div>
          <small class="text-muted">Stok, stok hareketi formuyla güncellenir.</small>
        </div>
        {% endif %}
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save me-1"></i>{% if urun %}Güncelle{% else %}Kaydet{% endif %}
        </button>
        <a href="{{ url_for('urunler') }}" class="btn btn-outline-secondary">İptal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
